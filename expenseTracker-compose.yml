services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 10s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_ROOT_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-db:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 20s

  user-service:
    image: archittyagi221/user-service
    container_name: user-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: userServiceDB
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9091/actuator/health || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      kong-service:
        condition: service_healthy

  expense-service:
    image: archittyagi221/expense-service
    container_name: expense-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expenseServiceDB
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9094/actuator/health || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      kong-service:
        condition: service_healthy

  message-service:
    image: archittyagi221/message-service
    container_name: message-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      OPENAI_API_KEY: Ym2a6ltwK32sszUfPhgXAuoBDfSyRf0x
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/message/v1')\" || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      kong-service:
        condition: service_healthy

  auth-service:
    image: archittyagi221/auth-service
    container_name: auth-service
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: authServiceDB
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9090/actuator/health || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: swagger-ui
    environment:
      # Served behind Kong at /swagger-ui (strip_path:false), so assets resolve under that prefix.
      BASE_URL: /swagger-ui
      # Relative spec URLs resolve against the Kong origin (localhost:8000) -> single origin, no CORS.
      URLS: >-
        [{"url":"/auth/v1/api-docs","name":"AuthService"},
         {"url":"/user/v1/api-docs","name":"UserService"},
         {"url":"/expense/v1/api-docs","name":"ExpenseService"},
         {"url":"/message/v1/api-docs","name":"MessageService"}]
      URLS_PRIMARY_NAME: AuthService
    expose:
      - "8080"

  kong-service:
    image: archittyagi221/kong:latest
    container_name: kong
    volumes:
      - "./kong/config:/usr/local/kong/declarative"
      - "./kong/custom-plugins:/usr/local/share/lua/5.1/kong/plugins"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"
      KONG_LOG_LEVEL: "debug"
      KONG_PLUGINS: "custom-auth"
      KONG_LUA_PACKAGE_PATH: "/usr/local/share/lua/5.1/?.lua;;"
    ports:
      - "8000:8000/tcp"
      - "127.0.0.1:7990:8001/tcp"
      - "8443:8443/tcp"
      - "127.0.0.1:8444:8444/tcp"
    healthcheck:
      test: ["CMD-SHELL", "kong health || exit 1"]
      start_interval: 5s
      interval: 24h
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      auth-service:
        condition: service_healthy
volumes:
  mysql-db:
    driver: local
